page1:
  heading: "<span class='ei'>🛸</span> Ein Raumschiff ist gelandet!"
  paragraphs:
    - "\"Wird diese Sternschnuppe in unserem Garten landen?\" Du schaust genau durch das Fenster und rennst sofort nach draußen, um das seltsame Licht zu untersuchen."
    - "Bald merkst du, dass es gar kein Stern ist, sondern ein Raumschiff! Die Luke öffnet sich und ein verwirrter kleiner Kerl schaut sich um. Er sieht, dass du winkst."
    - "Du bemerkst, dass das kleine Alien dich mit einem Gerät an seinem Arm scannt. \"Hey kleiner Freund, wie heißt du?\" fragst du sanft."
    - "Das Alien wartet ein paar Sekunden und schaut auf sein Gerät. \"Ich bin <em>Baby ƸŧÞŤƍƜƾɮƢ</em>,\" antwortet es."
    - "\"Du sprichst unsere Sprache?\" fragst du und kannst deine Aufregung kaum zurückhalten."
    - "\"Nein, ich benutze diesen Universalübersetzer. Er hilft mir, jeden in allen Galaxien zu verstehen und mit ihm zu sprechen,\" erklärt das <em>Alien-Baby</em> ruhig."
    - "\"Ist es okay, wenn ich dich mit einem irdischen Namen nenne, da ich deinen echten Namen nicht aussprechen kann?\" fragst du und versteckst deine Schüchternheit."
  name_label: "✏️ Tippe hier den Namen deines Aliens ein:"
  name_placeholder: "z.B. Zorp, Bleep, Nova…"
  name_greeting: "👾 \"Ja, du kannst mich {name} nennen!\" kichert das Alien-Baby. Es findet irdische Namen sehr lustig."
  next_button: "Nimm es mit nach drinnen! →"

page2:
  heading: "<span class='ei'>🏠</span> Willkommen zu Hause, {name}!"
  paragraphs:
    - "\"Besuchst du die Erde?\" fragst du <em>{name}</em>. \"Ich bin durch euer Sonnensystem gereist und musste notlanden. Mein Schiff muss sich selbst reparieren, bevor ich weiter durch die Galaxien reisen kann,\" sagt <em>{name}</em> und zeigt auf die Kapsel."
    - "\"Möchtest du bei uns bleiben, während dein Schiff repariert wird?\" fragst du und lädst <em>{name}</em> nach drinnen ein."
    - "<em>Baby {name}</em> war noch nie auf der Erde. Es weiß nichts über unsere Geräte, unser Essen oder unsere Regeln. Das ist seine <b>erste</b> Reise!"
    - "Während sich <em>{name}</em> staunend im Haus umsieht, fällt dir ein, dass du am nächsten Morgen Schule hast. Du beschließt, <em>{name}</em> beizubringen, wie man dein Lieblingssandwich macht, nur für den Fall, dass <em>{name}</em> hungrig wird, wenn du weg bist."
  algorithm_box_heading: "🤔 Denk mal nach:"
  algorithm_box_text: "Stell dir vor, du müsstest jemandem, der noch nie eine Küche gesehen hat, erklären, wie man ein Sandwich macht. <b>Jeder einzelne Schritt</b> muss genau erklärt werden. Das nennt man einen <b>Algorithmus</b> schreiben: eine genaue Schritt-für-Schritt-<b>Anleitung</b>, der ein <em>Computer</em> (oder ein <em>Alien</em>!) exakt folgen kann."
  next_button: "Plane das Sandwich! 🥪"

page3:
  heading: "<span class='ei'>🥪</span> Bring {name} bei, ein Sandwich zu machen"
  intro: "\"Was ist das?\" fragt <em>{name}</em>. \"Das ist Humphrey Bobark, unser Hund,\" antwortest du. \"Und was ist das?\" fragt <em>{name}</em>. \"Das ist Herr Flausch, unsere Katze.\" Du bemerkst etwas Wichtiges: Um <em>{name}</em> zu erklären, wie man ein Sandwich macht, musst du sehr genau sein. Du musst eine <b>Schritt-für-Schritt-Anleitung</b> schreiben!"
  next_button: "Schreibe nun die Anleitung! 📋"

page4:
  heading: "<span class='ei'>📋</span> Schreibe den <b>Algorithmus</b> für {name}!"
  intro: "Du hast das Sandwich ausgewählt. Schreibe nun die genauen Schritte einzeln auf, damit <em>{name}</em> sie perfekt befolgen kann. Denk dran: <em>{name}</em> hat noch nie einen Kühlschrank oder ein Buttermesser benutzt. <b>Jeder</b> kleine <b>Schritt</b> zählt!"
  sidebar_help: "Klicke auf \"＋ Schritt hinzufügen\", um eine Aktion und das passende Objekt zu wählen. Du kannst die Schritte nach oben oder unten ziehen, um sie neu zu ordnen. Klicke auf 🔍 Überprüfe meine Anleitung!, um hilfreiche Tipps zu bekommen."
  sidebar_remember: "Ein <b>Algorithmus</b> muss vollständig und in der richtigen <b>Reihenfolge</b> sein. Jeder kleine Schritt zählt!"
  validation_success: "✅ Super Algorithmus! {name} sollte all diese Schritte befolgen können. Gut gemacht! {name} kann sich jetzt selbst versorgen! 🥪"
  next_button: "Füttere das Alien! 🚀"

page5:
  heading: "<span class='ei'>🎉</span> Großartige Arbeit! <span class='ei'>🎉</span>"
  paragraphs:
    - "Du bist zur Schule gegangen. <em>{name}</em> hat jeden einzelnen Schritt deines <b>Algorithmus</b> sorgfältig gelesen und perfekt befolgt."
    - "Als du nach Hause kamst, saß <em>{name}</em> mit dem größten Lächeln am Küchentisch. \"Der <b>Algorithmus</b> hat funktioniert!\" piepste <em>{name}</em> glücklich. 🛸🥪✨"
  algo_title: "<span class='ei'>📋</span> <em>{name}s</em> Sandwich-<b>Algorithmus</b>"

hints:
  section_title: "🛸 {name} hat ein paar Fragen zu deinem Algorithmus:"
  footer: "Behebe die Hinweise oben und überprüfe dann erneut!"
  hands_not_washed:
    icon: "🧼"
    text: "Hat {name} sich die Hände gewaschen, bevor es das Essen berührt hat? Versuche, <b>Waschen → 👐 Hände</b> ganz am Anfang hinzuzufügen."
  fridge_not_closed:
    icon: "🚪"
    text: "Oh weh! Der Kühlschrank ist noch offen! Denk daran, <b>Schließen → 🧊 Kühlschrank</b> hinzuzufügen."
  fridge_not_opened:
    icon: "🧊"
    text: "Der Kühlschrank wurde nie geöffnet! Füge <b>Öffnen → 🧊 Kühlschrank</b> hinzu, bevor du Dinge herausnimmst."
  container_not_closed:
    icon: "🫙"
    text: "Das {container} ist noch offen! Füge <b>Schließen → 🫙 {container}</b> hinzu!"
  plate_not_taken:
    icon: "🍽️"
    text: "{name} braucht einen Teller! Füge <b>Herausnehmen → 🍽️ Teller</b> hinzu."
  bread_not_taken:
    icon: "🍞"
    text: "Kein Brot? Füge <b>Herausnehmen → 🍞 Brotscheibe</b> hinzu."
  spread_not_taken:
    icon: "🤔"
    text: "Füge zuerst <b>Herausnehmen → {spread}</b> hinzu."
  sandwich_not_closed:
    icon: "🥪"
    text: "Das Sandwich ist noch offen! Füge <b>Sandwich schließen</b> hinzu, um es fertigzustellen."
  nothing_put_back:
    icon: "↩️"
    text: "{name} sollte aufräumen. Füge ein paar <b>Zurücklegen</b>-Schritte hinzu!"